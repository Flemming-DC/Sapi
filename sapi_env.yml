name: sapi_env
dependencies:
  - Python = 3.10.6
  - pip = 24.2
  - pip:
    - anytree == 2.12.1 # used for path finding in the select parser
    - pydantic == 2.8.2 # possible not used at the moment. Will be used later in the editor
    - sqlglot == 25.10.0 # used for tokenizing sapi queries (this process is identical to tokenizing sql)
    - psycopg-binary == 3.2.1 # used to communicate with postgres
    - psycopg-pool == 3.2.2 # not used yet. Will probably be for connection pooling with postgres
    - oracledb == 2.4.1 # used to communicate with oracle
    - qt5-tools == 5.15.2.1.3 # used for designer
    - QScintilla == 2.14.1 # used for making an editor in PyQt
    - PyQt5-sip == 12.12.1 # this choice of version prevents irrelevant unfixable warnings


